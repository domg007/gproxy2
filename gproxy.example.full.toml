# GPROXY full bootstrap example.
# Copy to ./gproxy.toml and replace all placeholder secrets.
#
# User key namespace rule (API-side):
# - Keys created from /admin/user-keys/upsert or /user/keys/upsert are stored as:
#   u{user_id}_<raw_key>
# - If input already starts with current user's prefix (for example u12_), it is kept as-is.

[global]
host = "0.0.0.0"
port = 8787
# Empty string means no proxy.
proxy = ""
# Optional HuggingFace token for tokenizer download.
hf_token = ""
# Default HF endpoint.
hf_url = "https://huggingface.co"
# Empty => bootstrap auto-generates a 16-digit admin API key once.
admin_key = ""
# true: redact sensitive values in logs/events; false: full debug visibility.
mask_sensitive_info = true
# If data_dir is changed and dsn is kept empty in real config, runtime will derive sqlite dsn.
data_dir = "./data"
dsn = "sqlite://./data/gproxy.db?mode=rwc"

[runtime]
storage_write_queue_capacity = 4096
storage_write_max_batch_size = 1024
storage_write_aggregate_window_ms = 25

