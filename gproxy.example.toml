# GPROXY slim bootstrap example.
# Copy to ./gproxy.toml and replace placeholder secrets.
# For full multi-channel examples, see ./gproxy.example.full.toml.
#
# User key namespace rule (API-side):
# - Keys created from /admin/user-keys/upsert or /user/keys/upsert are stored as:
#   u{user_id}_<raw_key>
# - If input already starts with current user's prefix (for example u12_), it is kept as-is.

[global]
host = "0.0.0.0"
port = 8787
proxy = ""
admin_key = ""
mask_sensitive_info = true
data_dir = "./data"
dsn = "sqlite://./data/gproxy.db?mode=rwc"

# OpenAI (native)
[[channels]]
id = "openai"
enabled = true

[channels.settings]
base_url = "https://api.openai.com"

[[channels.credentials]]
secret = "sk-replace-me"

