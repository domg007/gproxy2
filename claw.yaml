apiVersion: app.claw.cloud/v1
kind: Template
metadata:
  name: gproxy
spec:
  title: 'gproxy'
  type: developer
  author: 'LeenHawk'
  author_id: 127599173
  date: 2026-03-06
  url: 'https://github.com/LeenHawk/gproxy'
  gitRepo: 'https://github.com/LeenHawk/gproxy'
  description: 'High-performance multi-provider LLM gateway with built-in admin frontend.'
  readme: 'https://raw.githubusercontent.com/LeenHawk/gproxy/refs/heads/main/samples/gproxy/README.md'
  icon: 'https://raw.githubusercontent.com/LeenHawk/gproxy/refs/heads/main/docs/public/web-app-manifest-512x512.png'
  templateType: inline
  locale: en
  categories:
    - ai
    - tool
  defaults:
    app_name:
      type: string
      value: gproxy-${{ random(8) }}
    app_host:
      type: string
      value: gproxy-${{ random(8) }}
  inputs:
    admin_key:
      description: 'Admin key used to access the built-in admin UI/API.'
      type: string
      default: ${{ random(32) }}
      required: true
    proxy_url:
      description: 'Optional upstream egress proxy URL.'
      type: string
      default: ''
      required: false
    rust_log:
      description: 'Rust log filter.'
      type: string
      default: info
      required: false
    volume_size:
      description: 'Persistent data volume size (Gi).'
      type: string
      default: '1'
      required: false

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ${{ defaults.app_name }}
  annotations:
    originImageName: ghcr.io/leenhawk/gproxy:latest
    deploy.run.claw.cloud/minReplicas: '1'
    deploy.run.claw.cloud/maxReplicas: '1'
  labels:
    run.claw.cloud/app-deploy-manager: ${{ defaults.app_name }}
    app: ${{ defaults.app_name }}
spec:
  replicas: 1
  revisionHistoryLimit: 1
  minReadySeconds: 10
  serviceName: ${{ defaults.app_name }}
  selector:
    matchLabels:
      app: ${{ defaults.app_name }}
  template:
    metadata:
      labels:
        app: ${{ defaults.app_name }}
    spec:
      terminationGracePeriodSeconds: 10
      automountServiceAccountToken: false
      containers:
        - name: ${{ defaults.app_name }}
          image: ghcr.io/leenhawk/gproxy:latest
          env:
            - name: GPROXY_ADMIN_KEY
              value: ${{ inputs.admin_key }}
            - name: GPROXY_HOST
              value: 0.0.0.0
            - name: GPROXY_PORT
              value: '8787'
            - name: GPROXY_DATA_DIR
              value: /app/data
            - name: GPROXY_DSN
              value: sqlite:///app/data/gproxy.db?mode=rwc
            - name: GPROXY_PROXY
              value: ${{ inputs.proxy_url }}
            - name: RUST_LOG
              value: ${{ inputs.rust_log }}
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 1024Mi
          ports:
            - containerPort: 8787
          imagePullPolicy: Always
          volumeMounts:
            - name: vn-data
              mountPath: /app/data
      volumes: []
  volumeClaimTemplates:
    - metadata:
        annotations:
          path: /app/data
          value: '1'
        name: vn-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: ${{ inputs.volume_size }}Gi

---
apiVersion: v1
kind: Service
metadata:
  name: ${{ defaults.app_name }}
  labels:
    run.claw.cloud/app-deploy-manager: ${{ defaults.app_name }}
spec:
  ports:
    - port: 8787
  selector:
    app: ${{ defaults.app_name }}

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${{ defaults.app_name }}
  labels:
    run.claw.cloud/app-deploy-manager: ${{ defaults.app_name }}
    run.claw.cloud/app-deploy-manager-domain: ${{ defaults.app_host }}
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: 32m
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-buffering: 'off'
    nginx.ingress.kubernetes.io/proxy-request-buffering: 'off'
    nginx.ingress.kubernetes.io/proxy-send-timeout: '3600'
    nginx.ingress.kubernetes.io/proxy-read-timeout: '3600'
spec:
  rules:
    - host: ${{ defaults.app_host }}.${{ CLAWCLOUD_CLOUD_DOMAIN }}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: ${{ defaults.app_name }}
                port:
                  number: 8787
  tls:
    - hosts:
        - ${{ defaults.app_host }}.${{ CLAWCLOUD_CLOUD_DOMAIN }}
      secretName: ${{ CLAWCLOUD_CERT_SECRET_NAME }}

---
apiVersion: app.claw.cloud/v1
kind: App
metadata:
  name: ${{ defaults.app_name }}
  labels:
    run.claw.cloud/app-deploy-manager: ${{ defaults.app_name }}
spec:
  data:
    url: https://${{ defaults.app_host }}.${{ CLAWCLOUD_CLOUD_DOMAIN }}
  displayType: normal
  icon: 'https://raw.githubusercontent.com/LeenHawk/gproxy/refs/heads/main/docs/public/web-app-manifest-512x512.png'
  name: gproxy
  type: link
