[package]
name = "gproxy"
version = "2.0.0"
edition = "2024"
license = "AGPL-3.0-or-later"
description = "gproxy v2 — high-performance LLM proxy (rewrite)"

[lib]
name = "gproxy"
path = "src/lib.rs"

[[bin]]
name = "gproxy"
path = "src/main.rs"

[workspace]

[dependencies]
anyhow = "1"
async-trait = "0.1"
axum = { version = "0.8", features = ["http2", "json"] }
clap = { version = "4", features = ["derive", "env"] }
dashmap = "6"
redis = { version = "=1.2.2", features = ["tokio-comp", "connection-manager"] }
sea-orm = { version = "=2.0.0-rc.40", features = ["runtime-tokio-rustls", "sqlx-sqlite", "sqlx-postgres", "sqlx-mysql"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal", "net"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }

[dev-dependencies]
tempfile = "3"
