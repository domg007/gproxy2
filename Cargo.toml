[package]
name = "gproxy"
version = "2.0.0"
edition = "2024"
license = "AGPL-3.0-or-later"
description = "gproxy v2 — high-performance LLM proxy (rewrite)"

[lib]
name = "gproxy"
path = "src/lib.rs"

[[bin]]
name = "gproxy"
path = "src/main.rs"

[workspace]

# ── deps compiled on BOTH native and wasm32 ──────────────────────────────────
[dependencies]
anyhow = "1"
async-trait = "0.1"
arc-swap = "1"
bytes = "1"
http = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tracing = "0.1"
dashmap = "6"

# ── native-only ───────────────────────────────────────────────────────────────
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
axum = { version = "0.8", features = ["http2", "json"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal", "net"] }
clap = { version = "4", features = ["derive", "env"] }
redis = { version = "=1.2.2", features = ["tokio-comp", "connection-manager"] }
sea-orm = { version = "=2.0.0-rc.40", features = ["runtime-tokio-rustls", "sqlx-sqlite", "sqlx-postgres", "sqlx-mysql"] }
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
wreq = { version = "6.0.0-rc.28", features = ["json", "stream", "gzip", "brotli", "zstd", "deflate"] }

# ── wasm32-only ───────────────────────────────────────────────────────────────
[target.'cfg(target_arch = "wasm32")'.dependencies]
axum = { version = "0.8", default-features = false, features = ["json"] }
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
web-sys = { version = "0.3", features = ["Headers", "Request", "RequestInit", "RequestMode", "Response", "ResponseInit", "WorkerGlobalScope"] }
tower = { version = "0.5", default-features = false, features = ["util"] }
http-body-util = "0.1"

[dev-dependencies]
tempfile = "3"
