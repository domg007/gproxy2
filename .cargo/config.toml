# getrandom 0.3+ deliberately refuses to build for wasm32-unknown-unknown unless
# the backend is selected explicitly. chacha20poly1305 0.11 (→ crypto-common 0.2
# → getrandom 0.4) needs this; the `wasm_js` feature is enabled on the dep in
# Cargo.toml. This cfg only applies to the wasm target — native builds untouched.
[target.wasm32-unknown-unknown]
rustflags = ['--cfg', 'getrandom_backend="wasm_js"']
