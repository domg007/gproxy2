name: build-binaries

on:
  push:
    branches:
      - main
      - master
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  GPROXY_UPDATE_CHANNEL: ${{ github.event_name == 'push' && 'staging' || 'stable' }}

jobs:
  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: apps/gproxy/frontend/pnpm-lock.yaml

      - name: Build frontend
        run: |
          cd apps/gproxy/frontend
          pnpm install --frozen-lockfile
          pnpm build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: apps/gproxy/frontend/dist
          retention-days: 1

  build:
    name: Build (${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.libc || 'std' }})
    needs: build-frontend
    runs-on: ${{ matrix.runner }}
    env:
      GPROXY_UPDATE_SIGN_KEY_ID: ${{ secrets.UPDATE_SIGNING_KEY_ID != '' && secrets.UPDATE_SIGNING_KEY_ID || 'gproxy-release-v1' }}
      GPROXY_UPDATE_SIGN_PUBLIC_KEY_B64: ${{ secrets.UPDATE_SIGNING_PUBLIC_KEY_B64 }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            runner: ubuntu-latest
            arch: x86_64
            libc: gnu
            run_check: true
          - platform: linux
            runner: ubuntu-24.04-arm
            arch: aarch64
            libc: gnu
            run_check: true
          - platform: linux
            runner: ubuntu-latest
            arch: x86_64
            libc: musl
            cross: true
            run_check: true
          - platform: linux
            runner: ubuntu-latest
            arch: aarch64
            libc: musl
            cross: true
            run_check: false
          - platform: android
            runner: ubuntu-latest
            arch: x86_64
            android_abi: x86_64
            run_check: false
          - platform: android
            runner: ubuntu-latest
            arch: aarch64
            android_abi: arm64-v8a
            run_check: false
          - platform: windows
            runner: windows-latest
            arch: x86_64
            run_check: true
          - platform: windows
            runner: windows-latest
            arch: aarch64
            run_check: false
          - platform: macos
            runner: macos-latest
            arch: x86_64
            run_check: true
          - platform: macos
            runner: macos-latest
            arch: aarch64
            run_check: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: apps/gproxy/frontend/dist

      - name: Validate update signing build settings
        run: |
          set -euo pipefail
          test -n "${GPROXY_UPDATE_SIGN_PUBLIC_KEY_B64}" || {
            echo "missing repo secret: UPDATE_SIGNING_PUBLIC_KEY_B64" >&2
            exit 1
          }

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust builds
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.libc || 'std' }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.libc || 'std' }}-

      - name: Derive target metadata
        shell: bash
        run: |
          case "${{ matrix.platform }}" in
            linux)
              target="${{ matrix.arch }}-unknown-linux-${{ matrix.libc }}"
              artifact="gproxy-linux-${{ matrix.arch }}"
              if [ "${{ matrix.libc }}" = "musl" ]; then
                artifact="${artifact}-musl"
              fi
              artifact="${artifact}.zip"
              ext=""
              ;;
            android)
              target="${{ matrix.arch }}-linux-android"
              artifact="gproxy-android-${{ matrix.arch }}.zip"
              ext=""
              ;;
            windows)
              target="${{ matrix.arch }}-pc-windows-msvc"
              artifact="gproxy-windows-${{ matrix.arch }}.zip"
              ext=".exe"
              ;;
            macos)
              target="${{ matrix.arch }}-apple-darwin"
              artifact="gproxy-macos-${{ matrix.arch }}.zip"
              ext=""
              ;;
            *)
              echo "unknown platform: ${{ matrix.platform }}" >&2
              exit 1
              ;;
          esac

          echo "TARGET=$target" >> "$GITHUB_ENV"
          echo "ARTIFACT=$artifact" >> "$GITHUB_ENV"
          echo "BIN_EXT=$ext" >> "$GITHUB_ENV"

      - name: Install target
        run: rustup target add "$TARGET"

      - name: Install Android NDK
        if: ${{ matrix.platform == 'android' }}
        uses: android-actions/setup-android@v3

      - name: Install Android toolchain
        if: ${{ matrix.platform == 'android' }}
        run: |
          sdkmanager "ndk;26.1.10909125"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> "$GITHUB_ENV"
          cargo install cargo-ndk --locked

      - name: Install cross
        if: ${{ matrix.cross }}
        run: |
          cargo install cross --locked
          echo "CROSS_TARGET=$TARGET" >> "$GITHUB_ENV"
          echo "CROSS_NO_DEFAULT_TOOLCHAIN=1" >> "$GITHUB_ENV"

      - name: Build (unix)
        if: ${{ runner.os != 'Windows' }}
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target "$TARGET" -p gproxy
          elif [ "${{ matrix.platform }}" = "android" ]; then
            cargo ndk -t ${{ matrix.android_abi }} build --release -p gproxy
          else
            cargo build --release --target "$TARGET" -p gproxy
          fi

      - name: Build (windows)
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        env:
          RUSTFLAGS: -C target-feature=+crt-static
          BORINGSSL_DISABLE_ASM: ${{ matrix.boringssl_disable_asm }}
        run: cargo build --release --target "$env:TARGET" -p gproxy

      - name: Run -h check (unix)
        if: ${{ runner.os != 'Windows' && matrix.run_check }}
        run: target/$TARGET/release/gproxy -h

      - name: Run -h check (windows)
        if: ${{ runner.os == 'Windows' && matrix.run_check }}
        shell: pwsh
        run: |
          $bin = Join-Path -Path "target" -ChildPath "$env:TARGET/release/gproxy$env:BIN_EXT"
          & $bin -h

      - name: Install UPX (linux)
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends upx-ucl zip

      - name: Install UPX (macos)
        if: ${{ runner.os == 'macOS' }}
        run: brew install upx

      - name: Install UPX (windows)
        if: ${{ runner.os == 'Windows' && matrix.arch != 'aarch64' }}
        shell: pwsh
        run: choco install upx -y

      - name: Compress binary (non-macos)
        if: ${{ runner.os != 'macOS' && !(matrix.platform == 'windows' && matrix.arch == 'aarch64') }}
        run: upx --best --lzma target/$TARGET/release/gproxy$BIN_EXT

      - name: Compress binary (macos)
        if: ${{ runner.os == 'macOS' }}
        run: upx --best --lzma --force-macos target/$TARGET/release/gproxy$BIN_EXT

      - name: Codesign (macos)
        if: ${{ runner.os == 'macOS' }}
        run: codesign --force --sign - target/$TARGET/release/gproxy$BIN_EXT

      - name: Prepare Linux Docker binary
        if: ${{ matrix.platform == 'linux' && (matrix.libc == 'gnu' || matrix.libc == 'musl') }}
        run: |
          mkdir -p docker-binary
          cp target/$TARGET/release/gproxy docker-binary/gproxy

      - name: Upload Linux Docker binary
        if: ${{ matrix.platform == 'linux' && (matrix.libc == 'gnu' || matrix.libc == 'musl') }}
        uses: actions/upload-artifact@v4
        with:
          name: docker-bin-${{ env.TARGET }}
          path: docker-binary/gproxy
          retention-days: 1

      - name: Package (unix)
        if: ${{ runner.os != 'Windows' }}
        run: |
          mkdir -p dist
          cp target/$TARGET/release/gproxy$BIN_EXT dist/gproxy$BIN_EXT
          cp LICENSE README.md dist/
          (cd dist && zip -9 ../$ARTIFACT gproxy$BIN_EXT LICENSE README.md)
          shasum -a 256 "$ARTIFACT" > "$ARTIFACT.sha256"

      - name: Package (windows)
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $bin = Join-Path -Path "target" -ChildPath "$env:TARGET/release/gproxy$env:BIN_EXT"
          $outBin = Join-Path -Path "dist" -ChildPath "gproxy$env:BIN_EXT"
          Copy-Item -Path $bin -Destination $outBin
          Copy-Item -Path LICENSE,README.md -Destination dist\
          Compress-Archive -Path $outBin,dist\LICENSE,dist\README.md -DestinationPath $env:ARTIFACT -Force
          $hash = (Get-FileHash $env:ARTIFACT -Algorithm SHA256).Hash.ToLower()
          "${hash}  $env:ARTIFACT" | Out-File -Encoding ASCII "$env:ARTIFACT.sha256"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-asset-${{ env.TARGET }}
          path: |
            ${{ env.ARTIFACT }}
            ${{ env.ARTIFACT }}.sha256
          retention-days: 1

      - name: Upload release assets
        if: ${{ github.event_name == 'release' }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.zip
            *.zip.sha256
          overwrite_files: true

  sign-release-assets:
    name: Sign release checksums
    if: ${{ github.event_name == 'release' || github.event_name == 'push' }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-asset-*
          path: dist
          merge-multiple: true

      - name: Validate signing settings
        env:
          UPDATE_SIGNING_PRIVATE_KEY_B64: ${{ secrets.UPDATE_SIGNING_PRIVATE_KEY_B64 }}
          UPDATE_SIGNING_PUBLIC_KEY_B64: ${{ secrets.UPDATE_SIGNING_PUBLIC_KEY_B64 }}
        run: |
          set -euo pipefail
          test -n "${UPDATE_SIGNING_PRIVATE_KEY_B64}" || {
            echo "missing repo secret: UPDATE_SIGNING_PRIVATE_KEY_B64" >&2
            exit 1
          }
          test -n "${UPDATE_SIGNING_PUBLIC_KEY_B64}" || {
            echo "missing repo secret: UPDATE_SIGNING_PUBLIC_KEY_B64" >&2
            exit 1
          }

      - name: Sign checksum files
        env:
          UPDATE_SIGNING_PRIVATE_KEY_B64: ${{ secrets.UPDATE_SIGNING_PRIVATE_KEY_B64 }}
          UPDATE_SIGNING_PUBLIC_KEY_B64: ${{ secrets.UPDATE_SIGNING_PUBLIC_KEY_B64 }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          mkdir -p .signing
          printf '%s' "${UPDATE_SIGNING_PRIVATE_KEY_B64}" | base64 --decode > .signing/update-signing-private.pem
          chmod 600 .signing/update-signing-private.pem

          derived_public_key_b64="$(openssl pkey -in .signing/update-signing-private.pem -pubout -outform DER | tail -c 32 | base64 -w0)"
          if [ "${derived_public_key_b64}" != "${UPDATE_SIGNING_PUBLIC_KEY_B64}" ]; then
            echo "update signing public key mismatch between private and configured public key" >&2
            exit 1
          fi

          files=(dist/*.zip.sha256)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "no checksum files found for signing" >&2
            exit 1
          fi

          for checksum in "${files[@]}"; do
            sig_bin="${checksum}.sig.bin"
            sig_txt="${checksum}.sig"
            openssl pkeyutl -sign -rawin \
              -inkey .signing/update-signing-private.pem \
              -in "$checksum" \
              -out "$sig_bin"
            base64 -w0 "$sig_bin" > "$sig_txt"
            printf '\n' >> "$sig_txt"
            rm -f "$sig_bin"
          done

          rm -f .signing/update-signing-private.pem

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-release-assets
          path: |
            dist/*.zip
            dist/*.zip.sha256
            dist/*.zip.sha256.sig
          retention-days: 1

  publish-release-signatures:
    name: Upload release signatures
    if: ${{ github.event_name == 'release' }}
    needs: sign-release-assets
    runs-on: ubuntu-latest
    steps:
      - name: Download signed artifacts
        uses: actions/download-artifact@v4
        with:
          name: signed-release-assets
          path: dist

      - name: Upload checksum signatures to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip.sha256.sig
          fail_on_unmatched_files: true
          overwrite_files: true

  publish-staging-release:
    name: Publish staging prerelease
    if: ${{ github.event_name == 'push' || github.event_name == 'release' }}
    needs: sign-release-assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download signed artifacts
        uses: actions/download-artifact@v4
        with:
          name: signed-release-assets
          path: dist

      - name: Move staging tag to current commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa staging -m "staging build ${GITHUB_SHA}" "${GITHUB_SHA}"
          git push origin refs/tags/staging --force

      - name: Publish staging release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: staging
          name: staging
          body: |
            Automated staging build from `${{ github.sha }}`.
          prerelease: true
          make_latest: false
          target_commitish: ${{ github.sha }}
          files: |
            dist/*.zip
            dist/*.zip.sha256
            dist/*.zip.sha256.sig
          fail_on_unmatched_files: true
          overwrite_files: true

  sync-cnb-staging:
    name: Sync CNB (staging)
    if: ${{ github.event_name == 'push' }}
    needs: publish-staging-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Sync Git Repository To CNB
        uses: docker://tencentcom/git-sync
        env:
          PLUGIN_TARGET_URL: ${{ secrets.CNB_REPO_URL }}
          PLUGIN_AUTH_TYPE: "https"
          PLUGIN_USERNAME: ${{ secrets.CNB_USERNAME }}
          PLUGIN_PASSWORD: ${{ secrets.CNB_TOKEN }}
          PLUGIN_FORCE: "true"
          PLUGIN_PUSH_TAGS: "true"

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends jq

      - name: Sync staging release assets and manifests to CNB
        env:
          CNB_REPO_SLUG: ${{ secrets.CNB_REPO_SLUG }}
          CNB_API_TOKEN: ${{ secrets.CNB_TOKEN }}
          CNB_USERNAME: ${{ secrets.CNB_USERNAME }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CNB_RELEASE_ASSET_TTL: ${{ secrets.CNB_RELEASE_ASSET_TTL }}
          UPDATE_SIGNING_KEY_ID: ${{ secrets.UPDATE_SIGNING_KEY_ID != '' && secrets.UPDATE_SIGNING_KEY_ID || 'gproxy-release-v1' }}
          RELEASE_TAG: "staging"
          SYNC_CHANNEL: "staging"
          CNB_PRERELEASE: "true"
          CNB_MAKE_LATEST: "false"
        run: |
          set -euo pipefail

          : "${CNB_REPO_SLUG:?missing secret CNB_REPO_SLUG}"
          : "${CNB_API_TOKEN:?missing secret CNB_TOKEN}"
          : "${CNB_USERNAME:?missing secret CNB_USERNAME}"
          : "${GH_REPO:?missing github repository}"
          : "${GH_TOKEN:?missing GITHUB_TOKEN}"
          : "${RELEASE_TAG:?missing RELEASE_TAG}"
          : "${SYNC_CHANNEL:?missing SYNC_CHANNEL}"

          CNB_API_BASE="https://api.cnb.cool/${CNB_REPO_SLUG}/-/releases"
          GH_API_BASE="https://api.github.com/repos/${GH_REPO}/releases"

          work_dir="$(mktemp -d)"
          gh_release_json="${work_dir}/gh-release.json"
          manifest_assets_jsonl="${work_dir}/manifest-assets.jsonl"
          : > "${manifest_assets_jsonl}"

          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GH_API_BASE}/tags/${RELEASE_TAG}" \
            -o "${gh_release_json}"

          gh_release_name="$(jq -r '.name // .tag_name // ""' "${gh_release_json}")"
          gh_release_body="$(jq -r '.body // ""' "${gh_release_json}")"
          gh_release_target="$(jq -r '.target_commitish // ""' "${gh_release_json}")"
          asset_count="$(jq '.assets | length' "${gh_release_json}")"
          if [ "${asset_count}" -eq 0 ]; then
            echo "no assets found on GitHub release tag ${RELEASE_TAG}" >&2
            exit 1
          fi

          cnb_release_json="${work_dir}/cnb-release.json"
          get_status="$(curl -sS -o "${cnb_release_json}" -w '%{http_code}' \
            -H "Accept: application/vnd.cnb.api+json" \
            -H "Authorization: Bearer ${CNB_API_TOKEN}" \
            "${CNB_API_BASE}/tags/${RELEASE_TAG}")"

          if [ "${get_status}" = "200" ]; then
            cnb_release_id="$(jq -r '.id // ""' "${cnb_release_json}")"
          elif [ "${get_status}" = "404" ]; then
            create_payload="$(jq -n \
              --arg tag "${RELEASE_TAG}" \
              --arg name "${gh_release_name}" \
              --arg body "${gh_release_body}" \
              --arg target "${gh_release_target}" \
              --arg make_latest "${CNB_MAKE_LATEST}" \
              --argjson prerelease "${CNB_PRERELEASE}" \
              '{tag_name:$tag,name:$name,body:$body,target_commitish:$target,prerelease:$prerelease,draft:false,make_latest:$make_latest}')"
            create_status="$(curl -sS -o "${cnb_release_json}" -w '%{http_code}' \
              -X POST \
              -H "Accept: application/vnd.cnb.api+json" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${CNB_API_TOKEN}" \
              -d "${create_payload}" \
              "${CNB_API_BASE}")"
            if [ "${create_status}" != "201" ]; then
              echo "failed to create CNB release ${RELEASE_TAG}, status=${create_status}" >&2
              cat "${cnb_release_json}" >&2
              exit 1
            fi
            cnb_release_id="$(jq -r '.id // ""' "${cnb_release_json}")"
          else
            echo "failed to get CNB release ${RELEASE_TAG}, status=${get_status}" >&2
            cat "${cnb_release_json}" >&2
            exit 1
          fi

          if [ -z "${cnb_release_id}" ]; then
            echo "empty CNB release id for tag ${RELEASE_TAG}" >&2
            exit 1
          fi

          jq -c '.assets[] | {id: .id, name: .name, size: (.size // 0)}' "${gh_release_json}" | \
          while IFS= read -r asset; do
            asset_id="$(jq -r '.id' <<< "${asset}")"
            asset_name="$(jq -r '.name' <<< "${asset}")"
            asset_size="$(jq -r '.size' <<< "${asset}")"
            asset_file="${work_dir}/${asset_name}"
            asset_api_url="https://api.github.com/repos/${GH_REPO}/releases/assets/${asset_id}"

            echo "sync asset: ${asset_name}"

            curl -fsSL \
              -L \
              -H "Accept: application/octet-stream" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${asset_api_url}" \
              -o "${asset_file}"

            if [ ! -s "${asset_file}" ]; then
              echo "downloaded empty asset: ${asset_name}" >&2
              exit 1
            fi

            if [ "${asset_size}" -le 0 ]; then
              asset_size="$(wc -c < "${asset_file}")"
            fi

            upload_resp="$(mktemp)"
            upload_payload="$(jq -n \
              --arg asset_name "${asset_name}" \
              --argjson size "${asset_size}" \
              '{asset_name:$asset_name,size:$size,overwrite:true}')"
            upload_status="$(curl -sS -o "${upload_resp}" -w '%{http_code}' \
              -X POST \
              -H "Accept: application/vnd.cnb.api+json" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${CNB_API_TOKEN}" \
              -d "${upload_payload}" \
              "${CNB_API_BASE}/${cnb_release_id}/asset-upload-url")"
            if [ "${upload_status}" != "201" ]; then
              echo "failed to request upload url for ${asset_name}, status=${upload_status}" >&2
              cat "${upload_resp}" >&2
              exit 1
            fi

            upload_url="$(jq -r '.upload_url // ""' "${upload_resp}")"
            verify_url="$(jq -r '.verify_url // ""' "${upload_resp}")"
            rm -f "${upload_resp}"

            if [ -z "${upload_url}" ] || [ -z "${verify_url}" ]; then
              echo "missing upload_url/verify_url for ${asset_name}" >&2
              exit 1
            fi

            curl -fsSL \
              -X PUT \
              -H "Content-Type: application/octet-stream" \
              --upload-file "${asset_file}" \
              "${upload_url}" >/dev/null

            verify_with_ttl="${verify_url}"
            if [ -n "${CNB_RELEASE_ASSET_TTL:-}" ]; then
              if [[ "${verify_with_ttl}" == *\?* ]]; then
                verify_with_ttl="${verify_with_ttl}&ttl=${CNB_RELEASE_ASSET_TTL}"
              else
                verify_with_ttl="${verify_with_ttl}?ttl=${CNB_RELEASE_ASSET_TTL}"
              fi
            fi

            curl -fsSL \
              -X POST \
              -H "Accept: application/vnd.cnb.api+json" \
              -H "Authorization: Bearer ${CNB_API_TOKEN}" \
              "${verify_with_ttl}" >/dev/null

            if [[ "${asset_name}" == *.zip ]]; then
              encoded_name="$(jq -rn --arg v "${asset_name}" '$v|@uri')"
              download_url="https://cnb.cool/${CNB_REPO_SLUG}/-/releases/download/${RELEASE_TAG}/${encoded_name}"
              jq -nc \
                --arg name "${asset_name}" \
                --arg url "${download_url}" \
                --arg sha256_url "${download_url}.sha256" \
                --arg sha256_sig_url "${download_url}.sha256.sig" \
                --arg key_id "${UPDATE_SIGNING_KEY_ID}" \
                '{name:$name,url:$url,sha256_url:$sha256_url,sha256_sig_url:$sha256_sig_url,key_id:$key_id}' \
                >> "${manifest_assets_jsonl}"
            fi
          done

          if [ ! -s "${manifest_assets_jsonl}" ]; then
            echo "no zip assets found for manifest on tag ${RELEASE_TAG}" >&2
            exit 1
          fi

          manifest_assets_json="$(jq -s '.' "${manifest_assets_jsonl}")"
          channel_manifest="${work_dir}/manifest-${SYNC_CHANNEL}.json"
          generated_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          jq -n \
            --arg tag "${RELEASE_TAG}" \
            --arg channel "${SYNC_CHANNEL}" \
            --arg key_id "${UPDATE_SIGNING_KEY_ID}" \
            --arg generated_at "${generated_at}" \
            --argjson assets "${manifest_assets_json}" \
            '{tag:$tag,channel:$channel,key_id:$key_id,generated_at:$generated_at,assets:$assets}' \
            > "${channel_manifest}"

          cnb_repo_dir="${work_dir}/cnb-repo"
          git clone --depth 1 "https://${CNB_USERNAME}:${CNB_API_TOKEN}@cnb.cool/${CNB_REPO_SLUG}.git" "${cnb_repo_dir}"
          default_branch="$(git -C "${cnb_repo_dir}" symbolic-ref --short refs/remotes/origin/HEAD 2>/dev/null | sed 's@^origin/@@')"
          if [ -z "${default_branch}" ]; then
            default_branch="main"
          fi

          mkdir -p "${cnb_repo_dir}/${SYNC_CHANNEL}"
          cp "${channel_manifest}" "${cnb_repo_dir}/${SYNC_CHANNEL}/manifest.json"

          release_assets='[]'
          if [ -f "${cnb_repo_dir}/releases/manifest.json" ]; then
            release_assets="$(jq -c '[ (.assets // [])[] | . + {path:("releases/" + .name)} ]' "${cnb_repo_dir}/releases/manifest.json")"
          fi
          staging_assets='[]'
          if [ -f "${cnb_repo_dir}/staging/manifest.json" ]; then
            staging_assets="$(jq -c '[ (.assets // [])[] | . + {path:("staging/" + .name)} ]' "${cnb_repo_dir}/staging/manifest.json")"
          fi
          root_assets="$(jq -cn --argjson releases "${release_assets}" --argjson staging "${staging_assets}" '($releases + $staging) | sort_by(.path)')"
          jq -n \
            --arg generated_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson assets "${root_assets}" \
            '{generated_at:$generated_at,assets:$assets}' \
            > "${cnb_repo_dir}/manifest.json"

          git -C "${cnb_repo_dir}" config user.name "github-actions[bot]"
          git -C "${cnb_repo_dir}" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "${cnb_repo_dir}" add manifest.json "${SYNC_CHANNEL}/manifest.json"
          if git -C "${cnb_repo_dir}" diff --cached --quiet; then
            echo "no manifest changes to commit"
            exit 0
          fi
          git -C "${cnb_repo_dir}" commit -m "chore(cnb): update ${SYNC_CHANNEL} manifest (${RELEASE_TAG})"

          pushed=0
          for attempt in 1 2 3; do
            if git -C "${cnb_repo_dir}" push origin "HEAD:${default_branch}"; then
              pushed=1
              break
            fi
            if [ "${attempt}" -eq 3 ]; then
              break
            fi
            git -C "${cnb_repo_dir}" fetch origin "${default_branch}"
            git -C "${cnb_repo_dir}" rebase "origin/${default_branch}"
          done

          if [ "${pushed}" -ne 1 ]; then
            echo "failed to push manifest updates to CNB after retries" >&2
            exit 1
          fi

  sync-cnb-release:
    name: Sync CNB (release)
    if: ${{ github.event_name == 'release' }}
    needs: publish-release-signatures
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Sync Git Repository To CNB
        uses: docker://tencentcom/git-sync
        env:
          PLUGIN_TARGET_URL: ${{ secrets.CNB_REPO_URL }}
          PLUGIN_AUTH_TYPE: "https"
          PLUGIN_USERNAME: ${{ secrets.CNB_USERNAME }}
          PLUGIN_PASSWORD: ${{ secrets.CNB_TOKEN }}
          PLUGIN_FORCE: "true"
          PLUGIN_PUSH_TAGS: "true"

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends jq

      - name: Sync published release assets and manifests to CNB
        env:
          CNB_REPO_SLUG: ${{ secrets.CNB_REPO_SLUG }}
          CNB_API_TOKEN: ${{ secrets.CNB_TOKEN }}
          CNB_USERNAME: ${{ secrets.CNB_USERNAME }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CNB_RELEASE_ASSET_TTL: ${{ secrets.CNB_RELEASE_ASSET_TTL }}
          UPDATE_SIGNING_KEY_ID: ${{ secrets.UPDATE_SIGNING_KEY_ID != '' && secrets.UPDATE_SIGNING_KEY_ID || 'gproxy-release-v1' }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          SYNC_CHANNEL: "releases"
          CNB_PRERELEASE: "false"
          CNB_MAKE_LATEST: "legacy"
        run: |
          set -euo pipefail

          : "${CNB_REPO_SLUG:?missing secret CNB_REPO_SLUG}"
          : "${CNB_API_TOKEN:?missing secret CNB_TOKEN}"
          : "${CNB_USERNAME:?missing secret CNB_USERNAME}"
          : "${GH_REPO:?missing github repository}"
          : "${GH_TOKEN:?missing GITHUB_TOKEN}"
          : "${RELEASE_TAG:?missing RELEASE_TAG}"
          : "${SYNC_CHANNEL:?missing SYNC_CHANNEL}"

          CNB_API_BASE="https://api.cnb.cool/${CNB_REPO_SLUG}/-/releases"
          GH_API_BASE="https://api.github.com/repos/${GH_REPO}/releases"

          work_dir="$(mktemp -d)"
          gh_release_json="${work_dir}/gh-release.json"
          manifest_assets_jsonl="${work_dir}/manifest-assets.jsonl"
          : > "${manifest_assets_jsonl}"

          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GH_API_BASE}/tags/${RELEASE_TAG}" \
            -o "${gh_release_json}"

          gh_release_name="$(jq -r '.name // .tag_name // ""' "${gh_release_json}")"
          gh_release_body="$(jq -r '.body // ""' "${gh_release_json}")"
          gh_release_target="$(jq -r '.target_commitish // ""' "${gh_release_json}")"
          asset_count="$(jq '.assets | length' "${gh_release_json}")"
          if [ "${asset_count}" -eq 0 ]; then
            echo "no assets found on GitHub release tag ${RELEASE_TAG}" >&2
            exit 1
          fi

          cnb_release_json="${work_dir}/cnb-release.json"
          get_status="$(curl -sS -o "${cnb_release_json}" -w '%{http_code}' \
            -H "Accept: application/vnd.cnb.api+json" \
            -H "Authorization: Bearer ${CNB_API_TOKEN}" \
            "${CNB_API_BASE}/tags/${RELEASE_TAG}")"

          if [ "${get_status}" = "200" ]; then
            cnb_release_id="$(jq -r '.id // ""' "${cnb_release_json}")"
          elif [ "${get_status}" = "404" ]; then
            create_payload="$(jq -n \
              --arg tag "${RELEASE_TAG}" \
              --arg name "${gh_release_name}" \
              --arg body "${gh_release_body}" \
              --arg target "${gh_release_target}" \
              --arg make_latest "${CNB_MAKE_LATEST}" \
              --argjson prerelease "${CNB_PRERELEASE}" \
              '{tag_name:$tag,name:$name,body:$body,target_commitish:$target,prerelease:$prerelease,draft:false,make_latest:$make_latest}')"
            create_status="$(curl -sS -o "${cnb_release_json}" -w '%{http_code}' \
              -X POST \
              -H "Accept: application/vnd.cnb.api+json" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${CNB_API_TOKEN}" \
              -d "${create_payload}" \
              "${CNB_API_BASE}")"
            if [ "${create_status}" != "201" ]; then
              echo "failed to create CNB release ${RELEASE_TAG}, status=${create_status}" >&2
              cat "${cnb_release_json}" >&2
              exit 1
            fi
            cnb_release_id="$(jq -r '.id // ""' "${cnb_release_json}")"
          else
            echo "failed to get CNB release ${RELEASE_TAG}, status=${get_status}" >&2
            cat "${cnb_release_json}" >&2
            exit 1
          fi

          if [ -z "${cnb_release_id}" ]; then
            echo "empty CNB release id for tag ${RELEASE_TAG}" >&2
            exit 1
          fi

          jq -c '.assets[] | {id: .id, name: .name, size: (.size // 0)}' "${gh_release_json}" | \
          while IFS= read -r asset; do
            asset_id="$(jq -r '.id' <<< "${asset}")"
            asset_name="$(jq -r '.name' <<< "${asset}")"
            asset_size="$(jq -r '.size' <<< "${asset}")"
            asset_file="${work_dir}/${asset_name}"
            asset_api_url="https://api.github.com/repos/${GH_REPO}/releases/assets/${asset_id}"

            echo "sync asset: ${asset_name}"

            curl -fsSL \
              -L \
              -H "Accept: application/octet-stream" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${asset_api_url}" \
              -o "${asset_file}"

            if [ ! -s "${asset_file}" ]; then
              echo "downloaded empty asset: ${asset_name}" >&2
              exit 1
            fi

            if [ "${asset_size}" -le 0 ]; then
              asset_size="$(wc -c < "${asset_file}")"
            fi

            upload_resp="$(mktemp)"
            upload_payload="$(jq -n \
              --arg asset_name "${asset_name}" \
              --argjson size "${asset_size}" \
              '{asset_name:$asset_name,size:$size,overwrite:true}')"
            upload_status="$(curl -sS -o "${upload_resp}" -w '%{http_code}' \
              -X POST \
              -H "Accept: application/vnd.cnb.api+json" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${CNB_API_TOKEN}" \
              -d "${upload_payload}" \
              "${CNB_API_BASE}/${cnb_release_id}/asset-upload-url")"
            if [ "${upload_status}" != "201" ]; then
              echo "failed to request upload url for ${asset_name}, status=${upload_status}" >&2
              cat "${upload_resp}" >&2
              exit 1
            fi

            upload_url="$(jq -r '.upload_url // ""' "${upload_resp}")"
            verify_url="$(jq -r '.verify_url // ""' "${upload_resp}")"
            rm -f "${upload_resp}"

            if [ -z "${upload_url}" ] || [ -z "${verify_url}" ]; then
              echo "missing upload_url/verify_url for ${asset_name}" >&2
              exit 1
            fi

            curl -fsSL \
              -X PUT \
              -H "Content-Type: application/octet-stream" \
              --upload-file "${asset_file}" \
              "${upload_url}" >/dev/null

            verify_with_ttl="${verify_url}"
            if [ -n "${CNB_RELEASE_ASSET_TTL:-}" ]; then
              if [[ "${verify_with_ttl}" == *\?* ]]; then
                verify_with_ttl="${verify_with_ttl}&ttl=${CNB_RELEASE_ASSET_TTL}"
              else
                verify_with_ttl="${verify_with_ttl}?ttl=${CNB_RELEASE_ASSET_TTL}"
              fi
            fi

            curl -fsSL \
              -X POST \
              -H "Accept: application/vnd.cnb.api+json" \
              -H "Authorization: Bearer ${CNB_API_TOKEN}" \
              "${verify_with_ttl}" >/dev/null

            if [[ "${asset_name}" == *.zip ]]; then
              encoded_name="$(jq -rn --arg v "${asset_name}" '$v|@uri')"
              download_url="https://cnb.cool/${CNB_REPO_SLUG}/-/releases/download/${RELEASE_TAG}/${encoded_name}"
              jq -nc \
                --arg name "${asset_name}" \
                --arg url "${download_url}" \
                --arg sha256_url "${download_url}.sha256" \
                --arg sha256_sig_url "${download_url}.sha256.sig" \
                --arg key_id "${UPDATE_SIGNING_KEY_ID}" \
                '{name:$name,url:$url,sha256_url:$sha256_url,sha256_sig_url:$sha256_sig_url,key_id:$key_id}' \
                >> "${manifest_assets_jsonl}"
            fi
          done

          if [ ! -s "${manifest_assets_jsonl}" ]; then
            echo "no zip assets found for manifest on tag ${RELEASE_TAG}" >&2
            exit 1
          fi

          manifest_assets_json="$(jq -s '.' "${manifest_assets_jsonl}")"
          channel_manifest="${work_dir}/manifest-${SYNC_CHANNEL}.json"
          generated_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          jq -n \
            --arg tag "${RELEASE_TAG}" \
            --arg channel "${SYNC_CHANNEL}" \
            --arg key_id "${UPDATE_SIGNING_KEY_ID}" \
            --arg generated_at "${generated_at}" \
            --argjson assets "${manifest_assets_json}" \
            '{tag:$tag,channel:$channel,key_id:$key_id,generated_at:$generated_at,assets:$assets}' \
            > "${channel_manifest}"

          cnb_repo_dir="${work_dir}/cnb-repo"
          git clone --depth 1 "https://${CNB_USERNAME}:${CNB_API_TOKEN}@cnb.cool/${CNB_REPO_SLUG}.git" "${cnb_repo_dir}"
          default_branch="$(git -C "${cnb_repo_dir}" symbolic-ref --short refs/remotes/origin/HEAD 2>/dev/null | sed 's@^origin/@@')"
          if [ -z "${default_branch}" ]; then
            default_branch="main"
          fi

          mkdir -p "${cnb_repo_dir}/${SYNC_CHANNEL}"
          cp "${channel_manifest}" "${cnb_repo_dir}/${SYNC_CHANNEL}/manifest.json"

          release_assets='[]'
          if [ -f "${cnb_repo_dir}/releases/manifest.json" ]; then
            release_assets="$(jq -c '[ (.assets // [])[] | . + {path:("releases/" + .name)} ]' "${cnb_repo_dir}/releases/manifest.json")"
          fi
          staging_assets='[]'
          if [ -f "${cnb_repo_dir}/staging/manifest.json" ]; then
            staging_assets="$(jq -c '[ (.assets // [])[] | . + {path:("staging/" + .name)} ]' "${cnb_repo_dir}/staging/manifest.json")"
          fi
          root_assets="$(jq -cn --argjson releases "${release_assets}" --argjson staging "${staging_assets}" '($releases + $staging) | sort_by(.path)')"
          jq -n \
            --arg generated_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson assets "${root_assets}" \
            '{generated_at:$generated_at,assets:$assets}' \
            > "${cnb_repo_dir}/manifest.json"

          git -C "${cnb_repo_dir}" config user.name "github-actions[bot]"
          git -C "${cnb_repo_dir}" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "${cnb_repo_dir}" add manifest.json "${SYNC_CHANNEL}/manifest.json"
          if git -C "${cnb_repo_dir}" diff --cached --quiet; then
            echo "no manifest changes to commit"
            exit 0
          fi
          git -C "${cnb_repo_dir}" commit -m "chore(cnb): update ${SYNC_CHANNEL} manifest (${RELEASE_TAG})"

          pushed=0
          for attempt in 1 2 3; do
            if git -C "${cnb_repo_dir}" push origin "HEAD:${default_branch}"; then
              pushed=1
              break
            fi
            if [ "${attempt}" -eq 3 ]; then
              break
            fi
            git -C "${cnb_repo_dir}" fetch origin "${default_branch}"
            git -C "${cnb_repo_dir}" rebase "origin/${default_branch}"
          done

          if [ "${pushed}" -ne 1 ]; then
            echo "failed to push manifest updates to CNB after retries" >&2
            exit 1
          fi

  deploy-docs-cloudflare:
    name: Build and Deploy Docs (Cloudflare Pages)
    if: ${{ (github.event_name == 'push' && github.ref_name == github.event.repository.default_branch) || github.event_name == 'release' }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: cloudflare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml

      - name: Build docs
        env:
          PUBLIC_DOWNLOADS_BASE_URL: ${{ secrets.DOWNLOAD_PUBLIC_BASE_URL != '' && secrets.DOWNLOAD_PUBLIC_BASE_URL || 'https://cnb.cool/ai-rp/gproxy' }}
        run: |
          cd docs
          pnpm install --frozen-lockfile
          pnpm build

      - name: Deploy docs to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PROJECT_ID: ${{ secrets.CLOUDFLARE_PROJECT_ID }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: "docs"
          command: pages deploy ./dist --project-name=${{ secrets.CLOUDFLARE_PROJECT_ID }}

  docker-build:
    name: Build Docker (${{ matrix.variant }}-${{ matrix.arch }})
    if: ${{ github.event_name == 'release' || github.event_name == 'push' }}
    needs: build
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: gnu
            arch: amd64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: ""
            runtime_base: gcr.io/distroless/cc-debian13
          - variant: gnu
            arch: arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            suffix: ""
            runtime_base: gcr.io/distroless/cc-debian13
          - variant: musl
            arch: amd64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            suffix: "-musl"
            runtime_base: gcr.io/distroless/static-debian13
          - variant: musl
            arch: arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            suffix: "-musl"
            runtime_base: gcr.io/distroless/static-debian13
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: docker-bin-${{ matrix.target }}
          path: dist

      - name: Prepare runtime files
        run: |
          chmod +x dist/gproxy
          mkdir -p dist/data

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/gproxy
          tags: |
            type=ref,event=tag,enable=${{ github.event_name == 'release' }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=raw,value=staging,enable=${{ github.event_name == 'push' }}
            type=sha,prefix=staging-,enable=${{ github.event_name == 'push' }}
          flavor: |
            suffix=-${{ matrix.arch }}${{ matrix.suffix }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.action
          platforms: linux/${{ matrix.arch }}
          push: true
          build-args: |
            RUNTIME_BASE=${{ matrix.runtime_base }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=gproxy-docker-${{ matrix.variant }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=gproxy-docker-${{ matrix.variant }}-${{ matrix.arch }}

  docker-manifest:
    name: Create Docker manifest
    if: ${{ github.event_name == 'release' || github.event_name == 'push' }}
    needs: docker-build
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/gproxy
          tags: |
            type=ref,event=tag,enable=${{ github.event_name == 'release' }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=raw,value=staging,enable=${{ github.event_name == 'push' }}
            type=sha,prefix=staging-,enable=${{ github.event_name == 'push' }}

      - name: Create glibc manifest list
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            if [ -n "$tag" ]; then
              docker buildx imagetools create -t "$tag" \
                "${tag}-amd64" \
                "${tag}-arm64"
            fi
          done <<< "${{ steps.meta.outputs.tags }}"

      - name: Create musl manifest list
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            if [ -n "$tag" ]; then
              docker buildx imagetools create -t "${tag}-musl" \
                "${tag}-amd64-musl" \
                "${tag}-arm64-musl"
            fi
          done <<< "${{ steps.meta.outputs.tags }}"
