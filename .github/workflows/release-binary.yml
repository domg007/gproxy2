name: build-binaries

on:
  push:
    branches:
      - main
      - master
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  GPROXY_UPDATE_CHANNEL: ${{ github.event_name == 'push' && 'staging' || 'stable' }}

jobs:
  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: apps/gproxy/frontend/pnpm-lock.yaml

      - name: Build frontend
        run: |
          cd apps/gproxy/frontend
          pnpm install --frozen-lockfile
          pnpm build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: apps/gproxy/frontend/dist
          retention-days: 1

  build:
    name: Build (${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.libc || 'std' }})
    needs: build-frontend
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            runner: ubuntu-latest
            arch: x86_64
            libc: gnu
            run_check: true
          - platform: linux
            runner: ubuntu-24.04-arm
            arch: aarch64
            libc: gnu
            run_check: true
          - platform: linux
            runner: ubuntu-latest
            arch: x86_64
            libc: musl
            cross: true
            run_check: true
          - platform: linux
            runner: ubuntu-latest
            arch: aarch64
            libc: musl
            cross: true
            run_check: false
          - platform: android
            runner: ubuntu-latest
            arch: x86_64
            android_abi: x86_64
            run_check: false
          - platform: android
            runner: ubuntu-latest
            arch: aarch64
            android_abi: arm64-v8a
            run_check: false
          - platform: windows
            runner: windows-latest
            arch: x86_64
            run_check: true
          - platform: windows
            runner: windows-latest
            arch: aarch64
            run_check: false
          - platform: macos
            runner: macos-latest
            arch: x86_64
            run_check: true
          - platform: macos
            runner: macos-latest
            arch: aarch64
            run_check: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: apps/gproxy/frontend/dist

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust builds
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.libc || 'std' }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.libc || 'std' }}-

      - name: Derive target metadata
        shell: bash
        run: |
          case "${{ matrix.platform }}" in
            linux)
              target="${{ matrix.arch }}-unknown-linux-${{ matrix.libc }}"
              artifact="gproxy-linux-${{ matrix.arch }}"
              if [ "${{ matrix.libc }}" = "musl" ]; then
                artifact="${artifact}-musl"
              fi
              artifact="${artifact}.zip"
              ext=""
              ;;
            android)
              target="${{ matrix.arch }}-linux-android"
              artifact="gproxy-android-${{ matrix.arch }}.zip"
              ext=""
              ;;
            windows)
              target="${{ matrix.arch }}-pc-windows-msvc"
              artifact="gproxy-windows-${{ matrix.arch }}.zip"
              ext=".exe"
              ;;
            macos)
              target="${{ matrix.arch }}-apple-darwin"
              artifact="gproxy-macos-${{ matrix.arch }}.zip"
              ext=""
              ;;
            *)
              echo "unknown platform: ${{ matrix.platform }}" >&2
              exit 1
              ;;
          esac

          echo "TARGET=$target" >> "$GITHUB_ENV"
          echo "ARTIFACT=$artifact" >> "$GITHUB_ENV"
          echo "BIN_EXT=$ext" >> "$GITHUB_ENV"

      - name: Install target
        run: rustup target add "$TARGET"

      - name: Install Android NDK
        if: ${{ matrix.platform == 'android' }}
        uses: android-actions/setup-android@v3

      - name: Install Android toolchain
        if: ${{ matrix.platform == 'android' }}
        run: |
          sdkmanager "ndk;26.1.10909125"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> "$GITHUB_ENV"
          cargo install cargo-ndk --locked

      - name: Install cross
        if: ${{ matrix.cross }}
        run: |
          cargo install cross --locked
          echo "CROSS_TARGET=$TARGET" >> "$GITHUB_ENV"
          echo "CROSS_NO_DEFAULT_TOOLCHAIN=1" >> "$GITHUB_ENV"

      - name: Build (unix)
        if: ${{ runner.os != 'Windows' }}
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target "$TARGET" -p gproxy
          elif [ "${{ matrix.platform }}" = "android" ]; then
            cargo ndk -t ${{ matrix.android_abi }} build --release -p gproxy
          else
            cargo build --release --target "$TARGET" -p gproxy
          fi

      - name: Build (windows)
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        env:
          RUSTFLAGS: -C target-feature=+crt-static
          BORINGSSL_DISABLE_ASM: ${{ matrix.boringssl_disable_asm }}
        run: cargo build --release --target "$env:TARGET" -p gproxy

      - name: Run -h check (unix)
        if: ${{ runner.os != 'Windows' && matrix.run_check }}
        run: target/$TARGET/release/gproxy -h

      - name: Run -h check (windows)
        if: ${{ runner.os == 'Windows' && matrix.run_check }}
        shell: pwsh
        run: |
          $bin = Join-Path -Path "target" -ChildPath "$env:TARGET/release/gproxy$env:BIN_EXT"
          & $bin -h

      - name: Install UPX (linux)
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends upx-ucl zip

      - name: Install UPX (macos)
        if: ${{ runner.os == 'macOS' }}
        run: brew install upx

      - name: Install UPX (windows)
        if: ${{ runner.os == 'Windows' && matrix.arch != 'aarch64' }}
        shell: pwsh
        run: choco install upx -y

      - name: Compress binary (non-macos)
        if: ${{ runner.os != 'macOS' && !(matrix.platform == 'windows' && matrix.arch == 'aarch64') }}
        run: upx --best --lzma target/$TARGET/release/gproxy$BIN_EXT

      - name: Compress binary (macos)
        if: ${{ runner.os == 'macOS' }}
        run: upx --best --lzma --force-macos target/$TARGET/release/gproxy$BIN_EXT

      - name: Codesign (macos)
        if: ${{ runner.os == 'macOS' }}
        run: codesign --force --sign - target/$TARGET/release/gproxy$BIN_EXT

      - name: Prepare Linux Docker binary
        if: ${{ matrix.platform == 'linux' && (matrix.libc == 'gnu' || matrix.libc == 'musl') }}
        run: |
          mkdir -p docker-binary
          cp target/$TARGET/release/gproxy docker-binary/gproxy

      - name: Upload Linux Docker binary
        if: ${{ matrix.platform == 'linux' && (matrix.libc == 'gnu' || matrix.libc == 'musl') }}
        uses: actions/upload-artifact@v4
        with:
          name: docker-bin-${{ env.TARGET }}
          path: docker-binary/gproxy
          retention-days: 1

      - name: Package (unix)
        if: ${{ runner.os != 'Windows' }}
        run: |
          mkdir -p dist
          cp target/$TARGET/release/gproxy$BIN_EXT dist/gproxy$BIN_EXT
          cp LICENSE README.md dist/
          (cd dist && zip -9 ../$ARTIFACT gproxy$BIN_EXT LICENSE README.md)
          shasum -a 256 "$ARTIFACT" > "$ARTIFACT.sha256"

      - name: Package (windows)
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $bin = Join-Path -Path "target" -ChildPath "$env:TARGET/release/gproxy$env:BIN_EXT"
          $outBin = Join-Path -Path "dist" -ChildPath "gproxy$env:BIN_EXT"
          Copy-Item -Path $bin -Destination $outBin
          Copy-Item -Path LICENSE,README.md -Destination dist\
          Compress-Archive -Path $outBin,dist\LICENSE,dist\README.md -DestinationPath $env:ARTIFACT -Force
          $hash = (Get-FileHash $env:ARTIFACT -Algorithm SHA256).Hash.ToLower()
          "${hash}  $env:ARTIFACT" | Out-File -Encoding ASCII "$env:ARTIFACT.sha256"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-asset-${{ env.TARGET }}
          path: |
            ${{ env.ARTIFACT }}
            ${{ env.ARTIFACT }}.sha256
          retention-days: 1

      - name: Upload release assets
        if: ${{ github.event_name == 'release' }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.zip
            *.zip.sha256
          overwrite_files: true

  publish-staging-release:
    name: Publish staging prerelease
    if: ${{ github.event_name == 'push' }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-asset-*
          path: dist
          merge-multiple: true

      - name: Move staging tag to current commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa staging -m "staging build ${GITHUB_SHA}" "${GITHUB_SHA}"
          git push origin refs/tags/staging --force

      - name: Publish staging release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: staging
          name: staging
          body: |
            Automated staging build from `${{ github.sha }}`.
          prerelease: true
          make_latest: false
          target_commitish: ${{ github.sha }}
          files: |
            dist/*.zip
            dist/*.zip.sha256
          fail_on_unmatched_files: true
          overwrite_files: true

  publish-binaries-s3:
    name: Publish binaries to S3-compatible storage
    if: ${{ github.event_name == 'release' || github.event_name == 'push' }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-asset-*
          path: dist
          merge-multiple: true

      - name: Resolve publish metadata
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "release" ]; then
            mode="release"
            tag="${{ github.event.release.tag_name }}"
            release_dir="${tag#v}"
          else
            mode="staging"
            tag="staging"
            release_dir=""
          fi

          public_base="${{ secrets.DOWNLOAD_PUBLIC_BASE_URL != '' && secrets.DOWNLOAD_PUBLIC_BASE_URL || 'https://download.gproxy.leenhawk.com' }}"
          public_base="${public_base%/}"

          echo "UPLOAD_MODE=$mode" >> "$GITHUB_ENV"
          echo "UPLOAD_TAG=$tag" >> "$GITHUB_ENV"
          echo "UPLOAD_RELEASE_DIR=$release_dir" >> "$GITHUB_ENV"
          echo "DOWNLOAD_PUBLIC_BASE_URL=$public_base" >> "$GITHUB_ENV"

      - name: Validate S3 publish settings
        shell: bash
        run: |
          set -euo pipefail
          test -n "${{ secrets.DOWNLOADS_S3_BUCKET }}" || {
            echo "missing repo secret: DOWNLOADS_S3_BUCKET" >&2
            exit 1
          }
          test -n "${{ secrets.DOWNLOADS_S3_ENDPOINT_URL }}" || {
            echo "missing repo secret: DOWNLOADS_S3_ENDPOINT_URL" >&2
            exit 1
          }
          test -n "${{ secrets.DOWNLOADS_S3_ACCESS_KEY_ID }}" || {
            echo "missing repo secret: DOWNLOADS_S3_ACCESS_KEY_ID" >&2
            exit 1
          }
          test -n "${{ secrets.DOWNLOADS_S3_SECRET_ACCESS_KEY }}" || {
            echo "missing repo secret: DOWNLOADS_S3_SECRET_ACCESS_KEY" >&2
            exit 1
          }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.DOWNLOADS_S3_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.DOWNLOADS_S3_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.DOWNLOADS_S3_REGION != '' && secrets.DOWNLOADS_S3_REGION || 'us-east-1' }}

      - name: Generate download manifest
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import datetime
          import json
          import os
          from pathlib import Path

          dist_dir = Path("dist")
          mode = os.environ["UPLOAD_MODE"]
          tag = os.environ["UPLOAD_TAG"]
          release_dir = os.environ.get("UPLOAD_RELEASE_DIR", "")
          public_base = os.environ["DOWNLOAD_PUBLIC_BASE_URL"].rstrip("/")

          def collect_assets(url_prefix: str):
              assets = []
              for zip_path in sorted(dist_dir.glob("*.zip")):
                  sha_path = Path(f"{zip_path}.sha256")
                  sha256 = None
                  if sha_path.exists():
                      raw = sha_path.read_text(encoding="utf-8").strip()
                      if raw:
                          sha256 = raw.split()[0]
                  assets.append(
                      {
                          "name": zip_path.name,
                          "url": f"{url_prefix}/{zip_path.name}",
                          "sha256": sha256,
                          "size": zip_path.stat().st_size,
                      }
                  )
              return assets

          def write_manifest(path: Path, channel: str, assets):
              manifest = {
                  "channel": channel,
                  "tag": tag,
                  "generated_at": datetime.datetime.now(datetime.UTC).isoformat(),
                  "assets": assets,
              }
              path.write_text(
                  json.dumps(manifest, ensure_ascii=False, indent=2) + "\n",
                  encoding="utf-8",
              )

          if mode == "staging":
              staging_assets = collect_assets(f"{public_base}/staging")
              write_manifest(dist_dir / "manifest.staging.json", "staging", staging_assets)
              print(f"manifest generated: mode=staging assets={len(staging_assets)}")
          else:
              latest_assets = collect_assets(public_base)
              write_manifest(dist_dir / "manifest.release.latest.json", "release", latest_assets)

              archived_assets = collect_assets(f"{public_base}/releases/{release_dir}")
              write_manifest(dist_dir / "manifest.release.archive.json", "release_archive", archived_assets)
              print(
                  f"manifest generated: mode=release latest_assets={len(latest_assets)} archive_dir={release_dir}"
              )
          PY

      - name: Upload binaries and manifest to S3
        shell: bash
        env:
          S3_BUCKET: ${{ secrets.DOWNLOADS_S3_BUCKET }}
          S3_ENDPOINT_URL: ${{ secrets.DOWNLOADS_S3_ENDPOINT_URL }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(dist/*.zip dist/*.zip.sha256)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "no files found to upload" >&2
            exit 1
          fi

          upload_one() {
            local src="$1"
            local key="$2"
            echo "uploading $src -> s3://${S3_BUCKET}/${key}"
            aws s3 cp "$src" "s3://${S3_BUCKET}/${key}" \
              --endpoint-url "${S3_ENDPOINT_URL}" \
              --no-progress
          }

          if [ "${UPLOAD_MODE}" = "staging" ]; then
            for file in "${files[@]}"; do
              upload_one "$file" "staging/$(basename "$file")"
            done
            upload_one "dist/manifest.staging.json" "staging/manifest.json"
          else
            for file in "${files[@]}"; do
              base="$(basename "$file")"
              upload_one "$file" "$base"
              upload_one "$file" "releases/${UPLOAD_RELEASE_DIR}/${base}"
            done
            upload_one "dist/manifest.release.latest.json" "manifest.json"
            upload_one "dist/manifest.release.archive.json" "releases/${UPLOAD_RELEASE_DIR}/manifest.json"
          fi

      - name: Upload summary
        shell: bash
        run: |
          set -euo pipefail
          echo "Upload mode: ${UPLOAD_MODE}" >> "$GITHUB_STEP_SUMMARY"
          echo "Uploaded tag: ${UPLOAD_TAG}" >> "$GITHUB_STEP_SUMMARY"
          echo "Public base URL: ${DOWNLOAD_PUBLIC_BASE_URL}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${UPLOAD_MODE}" = "staging" ]; then
            echo "Manifest: ${DOWNLOAD_PUBLIC_BASE_URL}/staging/manifest.json" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Latest manifest: ${DOWNLOAD_PUBLIC_BASE_URL}/manifest.json" >> "$GITHUB_STEP_SUMMARY"
            echo "Archive manifest: ${DOWNLOAD_PUBLIC_BASE_URL}/releases/${UPLOAD_RELEASE_DIR}/manifest.json" >> "$GITHUB_STEP_SUMMARY"
          fi

  deploy-docs-cloudflare:
    name: Build and Deploy Docs (Cloudflare Pages)
    if: ${{ (github.event_name == 'push' && github.ref_name == github.event.repository.default_branch) || github.event_name == 'release' }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: cloudflare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml

      - name: Build docs
        env:
          PUBLIC_DOWNLOADS_BASE_URL: ${{ secrets.DOWNLOAD_PUBLIC_BASE_URL != '' && secrets.DOWNLOAD_PUBLIC_BASE_URL || 'https://download.gproxy.leenhawk.com' }}
        run: |
          cd docs
          pnpm install --frozen-lockfile
          pnpm build

      - name: Deploy docs to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PROJECT_ID: ${{ secrets.CLOUDFLARE_PROJECT_ID }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: "docs"
          command: pages deploy ./dist --project-name=${{ secrets.CLOUDFLARE_PROJECT_ID }}

  docker-build:
    name: Build Docker (${{ matrix.variant }}-${{ matrix.arch }})
    if: ${{ github.event_name == 'release' || github.event_name == 'push' }}
    needs: build
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: gnu
            arch: amd64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: ""
            runtime_base: gcr.io/distroless/cc-debian13
          - variant: gnu
            arch: arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            suffix: ""
            runtime_base: gcr.io/distroless/cc-debian13
          - variant: musl
            arch: amd64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            suffix: "-musl"
            runtime_base: gcr.io/distroless/static-debian13
          - variant: musl
            arch: arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            suffix: "-musl"
            runtime_base: gcr.io/distroless/static-debian13
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: docker-bin-${{ matrix.target }}
          path: dist

      - name: Prepare runtime files
        run: |
          chmod +x dist/gproxy
          mkdir -p dist/data

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/gproxy
          tags: |
            type=ref,event=tag,enable=${{ github.event_name == 'release' }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=raw,value=staging,enable=${{ github.event_name == 'push' }}
            type=sha,prefix=staging-,enable=${{ github.event_name == 'push' }}
          flavor: |
            suffix=-${{ matrix.arch }}${{ matrix.suffix }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.action
          platforms: linux/${{ matrix.arch }}
          push: true
          build-args: |
            RUNTIME_BASE=${{ matrix.runtime_base }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=gproxy-docker-${{ matrix.variant }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=gproxy-docker-${{ matrix.variant }}-${{ matrix.arch }}

  docker-manifest:
    name: Create Docker manifest
    if: ${{ github.event_name == 'release' || github.event_name == 'push' }}
    needs: docker-build
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/gproxy
          tags: |
            type=ref,event=tag,enable=${{ github.event_name == 'release' }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=raw,value=staging,enable=${{ github.event_name == 'push' }}
            type=sha,prefix=staging-,enable=${{ github.event_name == 'push' }}

      - name: Create glibc manifest list
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            if [ -n "$tag" ]; then
              docker buildx imagetools create -t "$tag" \
                "${tag}-amd64" \
                "${tag}-arm64"
            fi
          done <<< "${{ steps.meta.outputs.tags }}"

      - name: Create musl manifest list
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            if [ -n "$tag" ]; then
              docker buildx imagetools create -t "${tag}-musl" \
                "${tag}-amd64-musl" \
                "${tag}-arm64-musl"
            fi
          done <<< "${{ steps.meta.outputs.tags }}"
