name: build-binaries

on:
  push:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            artifact: gproxy-linux-x86_64-musl.zip
            run_check: true
          - target: aarch64-unknown-linux-musl
            artifact: gproxy-linux-aarch64-musl.zip
            run_check: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: apps/gproxy/frontend/pnpm-lock.yaml

      - name: Build frontend
        run: |
          cd apps/gproxy/frontend
          pnpm install --frozen-lockfile
          pnpm build

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust builds
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: Install cross
        run: cargo install cross --locked

      - name: Build
        run: cross build --release --target "${{ matrix.target }}" -p gproxy

      - name: Run -h check
        if: ${{ matrix.run_check }}
        run: target/${{ matrix.target }}/release/gproxy -h

      - name: Install pack tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends upx-ucl zip

      - name: Compress binary
        run: upx --best --lzma target/${{ matrix.target }}/release/gproxy

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/gproxy dist/gproxy
          cp LICENSE README.md dist/
          (cd dist && zip -9 ../${{ matrix.artifact }} gproxy LICENSE README.md)
          sha256sum "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"

      - name: Upload release assets
        if: ${{ github.event_name == 'release' }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.zip
            *.zip.sha256
