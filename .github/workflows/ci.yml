name: ci

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  rust-quality:
    name: Rust Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings -A clippy::too_many_arguments

      - name: cargo test
        run: cargo test --workspace --all-targets --no-fail-fast

  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: apps/gproxy/frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: apps/gproxy/frontend
        run: pnpm install --frozen-lockfile

      - name: typecheck
        working-directory: apps/gproxy/frontend
        run: pnpm typecheck

      - name: lint
        working-directory: apps/gproxy/frontend
        run: pnpm lint

      - name: test
        working-directory: apps/gproxy/frontend
        run: pnpm test
