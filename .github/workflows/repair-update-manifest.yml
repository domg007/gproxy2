name: repair-update-manifest

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to repair, e.g. v2.0.8 or staging"
        required: true
      channel:
        description: "Manifest channel"
        required: true
        default: releases
        type: choice
        options:
          - releases
          - staging
      version:
        description: "Manifest version. For releases, defaults to tag without v; for staging, use a commit sha."
        required: false

permissions:
  contents: write

jobs:
  repair:
    name: Rebuild and upload manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download existing release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p flat dl
          gh release download "$TAG" \
            --pattern '*.zip' \
            --pattern '*.zip.sha256' \
            --dir flat

          map_asset() {
            case "$1" in
              gproxy-linux-x86_64.zip) echo x86_64-unknown-linux-gnu ;;
              gproxy-linux-aarch64.zip) echo aarch64-unknown-linux-gnu ;;
              gproxy-macos-x86_64.zip) echo x86_64-apple-darwin ;;
              gproxy-macos-aarch64.zip) echo aarch64-apple-darwin ;;
              gproxy-windows-x86_64.zip) echo x86_64-pc-windows-msvc ;;
              gproxy-windows-aarch64.zip) echo aarch64-pc-windows-msvc ;;
              *) return 1 ;;
            esac
          }

          for zip in flat/*.zip; do
            name="$(basename "$zip")"
            triple="$(map_asset "$name" || true)"
            [ -n "$triple" ] || continue
            mkdir -p "dl/release-asset-$triple"
            cp "$zip" "dl/release-asset-$triple/"
            cp "$zip.sha256" "dl/release-asset-$triple/"
          done

      - name: Build signed manifest
        env:
          UPDATE_SIGNING_PRIVATE_KEY_B64: ${{ secrets.UPDATE_SIGNING_PRIVATE_KEY_B64 }}
          UPDATE_SIGNING_PUBLIC_KEY_B64: ${{ secrets.UPDATE_SIGNING_PUBLIC_KEY_B64 }}
          TAG: ${{ inputs.tag }}
          CHANNEL: ${{ inputs.channel }}
          VERSION: ${{ inputs.version }}
          REPO: ${{ github.repository }}
          NOTES_URL: https://github.com/${{ github.repository }}/releases/tag/${{ inputs.tag }}
          ASSETS_DIR: dl
        run: bash scripts/build-update-manifest.sh

      - name: Upload repaired manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
        run: gh release upload "$TAG" manifest.json --clobber
